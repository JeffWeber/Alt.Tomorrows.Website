<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All the Bees Died — Divergent Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Special+Elite&family=Lora:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../styles.css">
<style>
/* Any timeline-specific overrides can go here */
</style>
</head>
<body>

<div class="page">

  <!-- ─── GLOBAL HEADER ─── -->
  <nav class="global-header">
      <a href="../../index.html" class="global-logo">Alternate Tomorrows</a>
      <div class="global-nav">
          <a href="../../index.html">Archive</a>
          <a href="../../about.html">About</a>
      </div>
  </nav>

  <!-- ─── HEADER ─── -->
  <header class="tl-header">
    <div class="tl-eyebrow">
      <span class="tl-badge">Divergent Timeline</span>
      <span class="tl-id">Archive ref: ATB-001</span>
    </div>
    <div class="tl-hero-image">
      <img src="${PLACEHOLDER_IMG}" alt="Timeline header illustration" id="hero-img" />
    </div>
    <h1 class="tl-title">All the Bees Died</h1>
    <span class="tl-years">2031 — 2095</span>
    <p class="tl-summary" id="header-summary"></p>
    <button class="tl-summary-toggle" id="summary-toggle">Read full summary ↓</button>
    <div class="tl-summary-full" id="summary-full"></div>
  </header>

  <!-- ─── TIMELINE ─── -->
  <div class="timeline">
    <div class="spine-rail"></div>
    <div id="timeline-mount"></div>
  </div>

  <!-- ─── FOOTER ─── -->
  <footer class="tl-footer">
    <span class="footer-txt">Divergent Timeline Archive — Internal Reference</span>
    <span class="footer-txt">3 eras · 13 key events · 8 lexicon entries</span>
  </footer>

</div>

<!-- Sensory overlay + drawer -->
<div class="overlay" id="overlay"></div>
<div class="sensory-drawer" id="sensory-drawer">
  <div class="drawer-inner">
    <div class="drawer-top">
      <div style="display:flex;align-items:baseline;gap:0.3rem;">
        <span class="drawer-label">Sensory Profile</span>
        <span class="drawer-era-name" id="drawer-era-name"></span>
      </div>
      <button class="drawer-close" id="drawer-close">Close ×</button>
    </div>
    <div class="sensory-grid" id="drawer-grid"></div>
  </div>
</div>

<!-- Lexicon tooltip -->
<div class="lex-tooltip" id="lex-tooltip">
  <span class="tooltip-fullname" id="tt-fullname"></span>
  <span class="tooltip-def" id="tt-def"></span>
  <span class="tooltip-charge" id="tt-charge"></span>
</div>

<script src="../../scripts.js"></script>
<script>
// Any timeline-specific JS overrides can go here
</script>
</body>
</html>
